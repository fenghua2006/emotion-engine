<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion Engine · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
  background: #0f0f16; color: #d0d0d8;
  height:100vh; overflow:hidden; display:flex; flex-direction:column;
}
/* ═══ 顶栏 ═══ */
header {
  background: #14141e; border-bottom: 1px solid #2a2a3a;
  padding: 10px 24px; display:flex; align-items:center; gap:18px;
  flex-shrink:0;
}
header h1 { font-size:20px; font-weight:600; color:#e0e0f0; }
header .badge {
  font-size:11px; padding:3px 10px; border-radius:10px; font-weight:500;
}
.badge-on { background:#1a3a1a; color:#4f4; }
.badge-off { background:#2a1a1a; color:#f55; }
/* 角色名 */
.char-tag { font-size:13px; color:#889; margin-left:auto; }
.char-tag span { color:#c8c0ff; font-weight:600; }

/* ═══ 主体网格 ═══ */
main {
  display:flex; flex-direction:column; gap:12px;
  padding:16px 24px; flex:1; overflow:hidden;
}
#bars-card { flex-shrink:0; }
#chart-card { flex:1; min-height:0; }
/* ═══ 情绪卡片 ═══ */
.card {
  background:#181820; border:1px solid #252535; border-radius:12px;
  padding:16px 20px; overflow:hidden;
}
.card-title {
  font-size:12px; text-transform:uppercase; letter-spacing:1.5px;
  color:#666; margin-bottom:12px;
}
/* 情绪条 */
#bars-grid {
  display:grid; grid-template-columns: repeat(5, 1fr); gap:8px 18px;
}
.emotion-bar-wrap {
  display:flex; flex-direction:column; gap:3px;
}
.emotion-label {
  font-size:11px; color:#888; display:flex; justify-content:space-between;
}
.emotion-name { font-weight:500; }
.emotion-value { font-variant-numeric:tabular-nums; }
.track {
  height:4px; background:#222230; border-radius:2px; overflow:hidden; position:relative;
}
.fill {
  height:100%; border-radius:2px; transition:width 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
/* 通道颜色 */
.fill.joy      { background:linear-gradient(90deg,#f5a623,#ffd93d); }
.fill.sadness   { background:linear-gradient(90deg,#4a90d9,#7ab8f5); }
.fill.anger     { background:linear-gradient(90deg,#e74c3c,#ff6b5a); }
.fill.fear      { background:linear-gradient(90deg,#8e44ad,#b87cd4); }
.fill.disgust   { background:linear-gradient(90deg,#27ae60,#5dd68a); }
.fill.surprise  { background:linear-gradient(90deg,#e67e22,#f5b041); }
.fill.trust     { background:linear-gradient(90deg,#2ecc71,#7ae8a0); }
.fill.love      { background:linear-gradient(90deg,#e91e63,#ff77a9); }
.fill.longing   { background:linear-gradient(90deg,#1abc9c,#5ee0c4); }
.fill.guilt     { background:linear-gradient(90deg,#7f8c8d,#b0b8b9); }

/* ═══ 氛围仪表 ═══ */
#atmos-section {
  display:flex; flex-direction:column; align-items:center; gap:8px;
  grid-column:2; grid-row:2;
}
#atmos-bar-wrap {
  width:100%; height:20px; background:linear-gradient(90deg,#c0392b 0%,#e74c3c 25%,#e67e22 50%,#f1c40f 75%,#2ecc71 100%);
  border-radius:10px; position:relative; overflow:hidden;
}
#atmos-needle {
  position:absolute; top:-3px; width:3px; height:26px; background:#fff;
  border-radius:2px; box-shadow:0 0 8px #fff8;
  transition:left 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
#atmos-label {
  font-size:12px; color:#888; display:flex; justify-content:space-between; width:100%;
}
#atmos-current {
  font-size:14px; font-weight:600;
}

/* ═══ 折线图 ═══ */
#chart-card { position:relative; overflow-y:auto; min-height:200px; }
#chart-wrapper { min-height:250px; position:relative; }
#history-chart { width:100% !important; }

/* 自定义图例——可滑动 */
#custom-legend {
  display:flex; flex-wrap:wrap; gap:4px 12px; padding:8px 0;
  font-size:10px; user-select:none;
}
#custom-legend .leg-item {
  display:flex; align-items:center; gap:3px; cursor:pointer;
  padding:2px 6px; border-radius:4px; transition:0.15s;
}
#custom-legend .leg-item:hover { background:#2a2a38; }
#custom-legend .leg-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}
#custom-legend .leg-text { color:#888; }
#custom-legend .leg-item.dimmed .leg-text { color:#444; }

/* ═══ dominant ═══ */
#dominant-display {
  text-align:center; font-size:14px; padding:4px 12px;
  border-radius:8px; background:#1a1a28; color:#ccc;
}
#dominant-display .dom-name { font-weight:700; font-size:16px; color:#fff; }

/* ═══ 底部输入 ═══ */
footer {
  background:#14141e; border-top:1px solid #2a2a3a;
  padding:10px 24px; flex-shrink:0;
  display:flex; align-items:center;
}
#event-input {
  flex:1; background:#1a1a28; border:1px solid #333; border-radius:8px;
  padding:8px 14px; color:#ddd; font-size:14px; outline:none;
  font-family:inherit;
}
#event-input:focus { border-color:#6c5ce7; }
#send-btn, #reset-btn {
  padding:8px 18px; border:none; border-radius:8px; font-size:13px; cursor:pointer;
  font-weight:600; transition:0.2s;
}
#send-btn { background:#6c5ce7; color:#fff; }
#send-btn:hover { background:#7e6ff0; }
#reset-btn { background:#2a2a3a; color:#999; }
#reset-btn:hover { background:#3a3a4a; }

/* ═══ 响应气泡 ═══ */
#response-toast {
  position:fixed; top:60px; right:24px; max-width:340px;
  background:#1a1a2e; border:1px solid #6c5ce7; border-radius:10px;
  padding:10px 16px; font-size:13px; color:#ccc; opacity:0;
  transform:translateY(-10px); transition:0.3s;
  pointer-events:none; z-index:100;
}
#response-toast.show { opacity:1; transform:translateY(0); }
#response-toast .utter { color:#f0e0ff; margin-bottom:4px; }
#response-toast .backend { font-size:10px; color:#666; }

/* ═══ 伤疤标记 ═══ */
.scar-tag {
  display:inline-block; font-size:10px; padding:1px 6px; margin:1px;
  background:#3a1a1a; color:#f88; border-radius:4px;
}

/* ═══ 左侧历史面板 ═══ */
#sidebar {
  position:fixed; left:0; top:0; bottom:0; width:320px;
  background:#111118; border-right:1px solid #2a2a3a;
  transform:translateX(-340px); transition:transform 0.25s ease;
  z-index:200; display:flex; flex-direction:column;
}
#sidebar.open { transform:translateX(0); }
#sidebar-toggle {
  position:fixed; left:0; top:50%; transform:translateY(-50%);
  width:18px; height:60px; background:#1a1a28; border:1px solid #2a2a3a;
  border-left:none; border-radius:0 8px 8px 0; cursor:pointer;
  z-index:201; transition:left 0.25s ease;
  writing-mode:vertical-lr; font-size:10px; color:#666;
  display:flex; align-items:center; justify-content:center;
}
#sidebar-toggle.moved { left:320px; }
#sidebar-header {
  padding:14px 16px; border-bottom:1px solid #2a2a3a;
  font-size:13px; color:#aaa; display:flex; justify-content:space-between; align-items:center;
  flex-shrink:0;
}
#sidebar-header button {
  background:none; border:none; color:#555; cursor:pointer; font-size:16px;
}
#sidebar-messages {
  flex:1; overflow-y:auto; padding:8px 12px;
}
.msg-item {
  margin-bottom:10px; font-size:12px; line-height:1.5;
}
.msg-user { color:#7a7aff; }
.msg-user::before { content:"▶ "; font-size:8px; }
.msg-char { color:#d0d0d8; margin-top:2px; padding-left:12px; border-left:2px solid #333; }
.msg-time { font-size:9px; color:#444; float:right; }
</style>
</head>
<body>

<!-- 左侧历史面板 -->
<div id="sidebar-toggle" onclick="toggleSidebar()">历史</div>
<div id="sidebar">
  <div id="sidebar-header">
    💬 对话历史
    <button onclick="toggleSidebar()" title="关闭">✕</button>
  </div>
  <div id="sidebar-messages"></div>
</div>

<header>
  <h1>🧠 Emotion Engine</h1>
  <span class="badge badge-on" id="conn-badge">● LIVE</span>
  <span class="char-tag">角色: <span id="char-name">—</span></span>
  <select id="char-switcher" onchange="switchCharacter()" style="
    background:#1a1a28; border:1px solid #333; color:#ccc; border-radius:6px;
    padding:3px 8px; font-size:11px; cursor:pointer; outline:none;
  "></select>
  <button onclick="toggleCustomPanel()" style="
    background:#2a2a3a; border:1px solid #444; color:#aaa; border-radius:6px;
    padding:3px 10px; font-size:11px; cursor:pointer;
  ">🎭 自定义</button>
  <button id="debug-btn" onclick="toggleDebug()" style="
    background:#2a2a3a; border:1px solid #444; color:#888; border-radius:6px;
    padding:3px 8px; font-size:11px; cursor:pointer;
  " title="调试模式">🐛</button>
  <button onclick="refreshCharList()" style="
    background:#2a2a3a; border:1px solid #444; color:#aaa; border-radius:6px;
    padding:3px 8px; font-size:11px; cursor:pointer;
  ">🔄</button>
  <span style="font-size:12px;color:#555;" id="poll-dot">⏳</span>
</header>

<!-- 自定义角色面板（默认隐藏） -->
<div id="custom-panel" style="display:none; background:#14141e; border-bottom:1px solid #2a2a3a; padding:12px 24px;">
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px 20px;">
    <div>
      <label style="font-size:10px;color:#555;">角色名</label>
      <input id="cust-name" placeholder="我的角色" style="width:100%; background:#1a1a28; border:1px solid #333; border-radius:4px; padding:4px 8px; color:#ddd; font-size:12px; outline:none;">
    </div>
    <div>
      <label style="font-size:10px;color:#555;">角色描述（LLM 用）</label>
      <input id="cust-desc" placeholder="一个温柔但内心孤独的骑士…" style="width:100%; background:#1a1a28; border:1px solid #333; border-radius:4px; padding:4px 8px; color:#ddd; font-size:12px; outline:none;">
    </div>
    <div style="display:flex; align-items:flex-end; gap:6px;">
      <button onclick="createCustomChar()" style="background:#6c5ce7; color:#fff; border:none; border-radius:4px; padding:4px 14px; font-size:11px; cursor:pointer; font-weight:600;">创建</button>
      <button onclick="saveCustomChar()" style="background:#27ae60; color:#fff; border:none; border-radius:4px; padding:4px 14px; font-size:11px; cursor:pointer; font-weight:600;">💾 保存</button>
      <button onclick="toggleCustomPanel()" style="background:none; color:#666; border:none; cursor:pointer; font-size:10px;">收起</button>
    </div>
  </div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:6px 14px; margin-top:8px;">
    <div><label style="font-size:9px;color:#555;">开放性 O</label><input id="cust-O" type="range" min="0" max="1" step="0.05" value="0.5" style="width:100%; accent-color:#f5a623;"></div>
    <div><label style="font-size:9px;color:#555;">尽责性 C</label><input id="cust-C" type="range" min="0" max="1" step="0.05" value="0.5" style="width:100%; accent-color:#2ecc71;"></div>
    <div><label style="font-size:9px;color:#555;">外向性 E</label><input id="cust-E" type="range" min="0" max="1" step="0.05" value="0.5" style="width:100%; accent-color:#4a90d9;"></div>
    <div><label style="font-size:9px;color:#555;">宜人性 A</label><input id="cust-A" type="range" min="0" max="1" step="0.05" value="0.5" style="width:100%; accent-color:#e91e63;"></div>
    <div><label style="font-size:9px;color:#555;">神经质 N</label><input id="cust-N" type="range" min="0" max="1" step="0.05" value="0.5" style="width:100%; accent-color:#8e44ad;"></div>
  </div>
  <div style="font-size:10px;color:#444;margin-top:4px;">OCEAN 人格 → 自动推导 10 通道情绪基线。角色描述供 LLM 生成自然对话。</div>
</div>

<main>
  <!-- 情绪柱状图 + 氛围行 -->
  <div class="card" id="bars-card" style="display:flex; gap:20px; align-items:center; flex-wrap:wrap;">
    <div style="flex:1; min-width:300px;">
      <div class="card-title">📊 情绪通道 · felt (log₁₀)</div>
      <div id="bars-grid"></div>
    </div>
    <!-- 氛围指示 -->
    <div style="width:200px; flex-shrink:0;">
      <div style="font-size:10px;color:#555;margin-bottom:4px;">🌡️ 氛围</div>
      <div id="atmos-bar-wrap" style="height:20px;">
        <div id="atmos-needle" style="left:35%;"></div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:9px; color:#555;">
        <span>紧绷</span><span id="atmos-current" style="color:#ccc;font-weight:600;">0.30</span><span>轻松</span>
      </div>
      <div id="dominant-display" style="margin-top:8px; text-align:center; font-size:12px;">
        dom: <b id="dom-text" style="color:#fff;">—</b>
      </div>
      <div id="memory-stats" style="font-size:10px;color:#444;margin-top:4px;text-align:center;">
        记忆 flash <b id="mem-flash">0</b> · long <b id="mem-long">0</b> · short <b id="mem-short">0</b>
      </div>
      <div id="scar-section" style="font-size:10px;margin-top:2px;text-align:center;"></div>
    </div>
  </div>

  <!-- 折线图 -->
  <div class="card" id="chart-card">
    <div class="card-title">📈 情绪走势 · felt 值历史（可滑动）</div>
    <div id="chart-wrapper"><canvas id="history-chart"></canvas></div>
    <div id="custom-legend"></div>
  </div>
  <div style="display:flex; align-items:center; justify-content:flex-end; gap:6px; margin:0 24px 4px auto; max-width:500px;">
    <div id="response-display" style="
      flex:1; padding:8px 16px; font-size:14px; color:#e0d8ff; min-height:24px;
      text-align:right; transition:0.3s; opacity:0;
    "></div>
  </div>
  <audio id="tts-audio" style="display:none"></audio>
</main>

<footer style="flex-direction:row; justify-content:space-between;">
  <!-- 左下角 API -->
  <div style="display:flex; gap:6px; align-items:center;">
    <span style="font-size:10px;color:#444;">🔑</span>
    <input id="api-key-input" type="password" placeholder="API key…" style="
      width:180px; background:#1a1a28; border:1px solid #333; border-radius:4px;
      padding:4px 8px; color:#ddd; font-size:11px; outline:none; font-family:inherit;
    " />
    <label style="font-size:10px;color:#666;display:flex;align-items:center;gap:3px;cursor:pointer;white-space:nowrap;">
      <input type="checkbox" id="llm-toggle" onchange="onLLMToggle()" style="accent-color:#6c5ce7;" />
      LLM <span id="llm-dot" style="font-size:10px;color:#444;" title="●=已连接 ○=模板">○</span>
    </label>
  </div>
  <!-- 右下角输入 -->
  <div style="display:flex; gap:8px; align-items:center;">
    <input id="event-input" placeholder="输入事件…" style="
      width:240px; background:#1a1a28; border:1px solid #333; border-radius:8px;
      padding:6px 12px; color:#ddd; font-size:13px; outline:none; font-family:inherit;
    " />
    <button id="send-btn" onclick="sendEvent()">触发</button>
    <button id="reset-btn" onclick="resetEngine()">重置</button>
  </div>
</footer>

<div id="response-toast"></div>

<script>
// ═══════════════════════════════════════════════
// 通道列表 & 颜色
// ═══════════════════════════════════════════════
const CHANNELS = ["joy","sadness","anger","fear","disgust","surprise","trust","love","longing","guilt"];
const CH_NAMES = {
  joy:"喜悦",sadness:"悲伤",anger:"愤怒",fear:"恐惧",disgust:"厌恶",
  surprise:"惊讶",trust:"信任",love:"爱",longing:"思念",guilt:"愧疚"
};
const CH_COLORS = {
  joy:"#ffd93d",sadness:"#7ab8f5",anger:"#ff6b5a",fear:"#b87cd4",disgust:"#5dd68a",
  surprise:"#f5b041",trust:"#7ae8a0",love:"#ff77a9",longing:"#5ee0c4",guilt:"#b0b8b9"
};

// ═══════════════════════════════════════════════
// 初始化情绪条
// ═══════════════════════════════════════════════
const grid = document.getElementById("bars-grid");
const barWraps = {};
CHANNELS.forEach(ch => {
  const wrap = document.createElement("div"); wrap.className="emotion-bar-wrap";
  wrap.innerHTML = `
    <div class="emotion-label">
      <span class="emotion-name">${CH_NAMES[ch]}</span>
      <span class="emotion-value" id="val-${ch}">0.00</span>
    </div>
    <div class="track"><div class="fill ${ch}" id="fill-${ch}" style="width:0%"></div></div>
  `;
  grid.appendChild(wrap);
  barWraps[ch] = wrap;
});

// ═══════════════════════════════════════════════
// Chart.js 折线图
// ═══════════════════════════════════════════════
const ctx = document.getElementById("history-chart").getContext("2d");
const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: [],
    datasets: CHANNELS.map(ch => ({
      label: CH_NAMES[ch], data: [],
      borderColor: CH_COLORS[ch], backgroundColor: CH_COLORS[ch] + "22",
      borderWidth: 1.5, pointRadius: 0, tension: 0.3,
      fill: false,
    }))
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: { display: false }
    },
    scales: {
      x: { display:false },
      y: { min:0, max:0.5, ticks:{color:"#555",font:{size:10},
        callback:v=>v.toFixed(2)}, grid:{color:"#1a1a2a"} }
    }
  },
  plugins: [{
    id: 'customLegend',
    afterUpdate(chart) { buildCustomLegend(chart); }
  }]
});

// ═══════════════════════════════════════════════
// 对话历史 + 侧边栏
// ═══════════════════════════════════════════════
let chatHistory = [];

function toggleSidebar() {
  const s = document.getElementById("sidebar");
  const t = document.getElementById("sidebar-toggle");
  s.classList.toggle("open");
  t.classList.toggle("moved");
}

function addMessage(userText, charText) {
  const now = new Date().toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit"});
  chatHistory.push({user:userText, char:charText, time:now});
  if (chatHistory.length > 200) chatHistory.shift();
  renderMessages();
}

function renderMessages() {
  const container = document.getElementById("sidebar-messages");
  if (!container) return;
  let html = "";
  chatHistory.slice().reverse().forEach(m => {
    html += `<div class="msg-item">
      <span class="msg-time">${m.time}</span>
      <div class="msg-user">${escHtml(m.user)}</div>
      <div class="msg-char">${escHtml(m.char)}</div>
    </div>`;
  });
  container.innerHTML = html || "<div style='color:#444;font-size:11px;padding:20px;text-align:center;'>尚无对话</div>";
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

// ═══════════════════════════════════════════════
// 语音（本地 SoVITS）
// ═══════════════════════════════════════════════
let lastUtterance = "";

async function playTTS(text) {
  if (!text) return;
  const audio = document.getElementById("tts-audio");
  audio.src = "/api/tts?text=" + encodeURIComponent(text);
  audio.play().catch(() => {}); // 静默失败（SoVITS 没开时）
  document.getElementById("speak-btn").style.display = "inline-block";
}

// ═══════════════════════════════════════════════
// 自定义可滑动图例
// ═══════════════════════════════════════════════
function buildCustomLegend(chart) {
  const container = document.getElementById("custom-legend");
  if (!container) return;
  const ci = chart;
  let html = "";
  ci.data.datasets.forEach((ds, i) => {
    const visible = ci.isDatasetVisible(i);
    const dimClass = visible ? "" : " dimmed";
    html += `<span class="leg-item${dimClass}" onclick="toggleDataset(${i})">
      <span class="leg-dot" style="background:${ds.borderColor}"></span>
      <span class="leg-text">${ds.label}</span>
    </span>`;
  });
  container.innerHTML = html;
}

// toggleDataset 暴露到全局
function toggleDataset(i) {
  const ci = Chart.getChart("history-chart");
  if (!ci) return;
  const vis = ci.isDatasetVisible(i);
  ci.setDatasetVisibility(i, !vis);
  ci.update("none");
  buildCustomLegend(ci);
}
window.toggleDataset = toggleDataset;

// ═══════════════════════════════════════════════
// 数据拉取
// ═══════════════════════════════════════════════
let pollTimer = null;
let failCount = 0;
const MAX_LABELS = 120;

async function poll() {
  const dot = document.getElementById("poll-dot");
  try {
    const r = await fetch("/api/state");
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    failCount = 0;
    dot.textContent = "●";
    dot.style.color = "#4f4";
    document.getElementById("conn-badge").textContent = "● LIVE";
    document.getElementById("conn-badge").className = "badge badge-on";
    updateUI(data);
  } catch(e) {
    failCount++;
    dot.textContent = "●";
    dot.style.color = failCount > 3 ? "#f55" : "#f80";
    if (failCount > 5) {
      document.getElementById("conn-badge").textContent = "● OFFLINE";
      document.getElementById("conn-badge").className = "badge badge-off";
    }
  }
}

function updateUI(data) {
  // 角色名
  if (data.character) {
    document.getElementById("char-name").textContent = data.character;
    document.title = "Emotion Engine · " + data.character;
    const sw = document.getElementById("char-switcher");
    if (data.character_id && sw.value !== data.character_id) {
      sw.value = data.character_id;
    }
    // 不显示初始提示——保持干净
  }

  const felt = data.felt;
  // 情绪条
  CHANNELS.forEach(ch => {
    const v = felt[ch] || 0;
    document.getElementById(`val-${ch}`).textContent = v.toFixed(3);
    document.getElementById(`fill-${ch}`).style.width = Math.min(100, v*200)+"%";
  });

  // dominant
  const dom = (data.dominant||"").replace("_dominant","");
  document.getElementById("dom-text").textContent = CH_NAMES[dom] || dom || "—";

  // 氛围
  const atm = data.atmosphere;
  document.getElementById("atmos-current").textContent = atm>0 ? "+"+atm.toFixed(2) : atm.toFixed(2);
  const needlePct = (atm + 1) / 2 * 100;  // -1→0%, +1→100%
  document.getElementById("atmos-needle").style.left = Math.max(0,Math.min(100,needlePct))+"%";

  // 记忆
  const mem = data.memory || {};
  document.getElementById("mem-flash").textContent = mem.flash||0;
  document.getElementById("mem-long").textContent = mem.long_term||0;
  document.getElementById("mem-short").textContent = mem.short_term||0;

  // 伤疤
  const scarDiv = document.getElementById("scar-section");
  if (data.scars && data.scars.length > 0) {
    scarDiv.innerHTML = data.scars.map(s =>
      `<span class="scar-tag">⚡${s.tag||s}×${s.count||s.trigger_count||1}</span>`
    ).join(" ");
  } else {
    scarDiv.innerHTML = "";
  }

  // 折线图——追加数据点
  const label = new Date(data.timestamp*1000).toLocaleTimeString("zh-CN");
  chart.data.labels.push(label);
  CHANNELS.forEach((ch,i) => {
    chart.data.datasets[i].data.push(felt[ch]||0);
  });
  if (chart.data.labels.length > MAX_LABELS) {
    chart.data.labels.shift();
    chart.data.datasets.forEach(ds => ds.data.shift());
  }
  chart.update("none");
}

// ═══════════════════════════════════════════════
// 发送事件
// ═══════════════════════════════════════════════
async function sendEvent() {
  const inp = document.getElementById("event-input");
  const text = inp.value.trim();
  if (!text) return;
  inp.value = "";

  const body = {text};
  const useLLM = document.getElementById("llm-toggle").checked;
  if (useLLM) {
    body.api_key = document.getElementById("api-key-input").value.trim();
    if (!body.api_key) { showToast("请先填入 API key"); return; }
  }

  try {
    const r = await fetch("/api/event", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    const data = await r.json();
    const llmUsed = data._llm_used !== false;
    const backend = data._llm_backend || (llmUsed ? "API" : "");
    if (data.utterance) {
      showToast(data.utterance);
      addMessage(text, data.utterance);
      lastUtterance = data.utterance;
      const disp = document.getElementById("response-display");
      if (disp && data.utterance) {
        disp.style.opacity = "1";
        disp.style.background = "#1a1a2e";
        disp.style.padding = "8px 16px";
        if (debugMode) {
          const tag = data._llm_backend || (data._llm_used ? "API" : "模板");
          const color = data._llm_used ? "#6c5ce7" : "#555";
          disp.style.borderLeft = "3px solid " + color;
          disp.style.borderRadius = "0 8px 8px 0";
          const extra = data._llm_used ? "" : " (key=" + (document.getElementById("api-key-input").value.length||0) + "c)";
          disp.innerHTML = '<span style=\"font-size:10px;color:'+color+';\">['+tag+extra+']</span> '+escHtml(data.utterance);
        } else {
          disp.style.borderLeft = "3px solid " + (data._llm_used ? "#6c5ce7" : "#333");
          disp.style.borderRadius = "0 8px 8px 0";
          disp.innerHTML = escHtml(data.utterance);
        }
      }
      // 更新 API 指示灯
      const dot = document.getElementById("llm-dot");
      if (dot) {
        dot.textContent = data._llm_used ? "●" : "○";
        dot.style.color = data._llm_used ? "#6c5ce7" : "#444";
      }
    }
    if (data.state) updateUI(data.state);
  } catch(e) {
    showToast("请求失败: " + e.message);
  }
}

// ═══════════════════════════════════════════════
// 自定义角色
// ═══════════════════════════════════════════════
function toggleCustomPanel() {
  const p = document.getElementById("custom-panel");
  p.style.display = p.style.display === "none" ? "block" : "none";
}

async function createCustomChar() {
  const name = document.getElementById("cust-name").value.trim() || "Custom";
  const desc = document.getElementById("cust-desc").value.trim() || "A unique character.";
  const ocean = {
    O: parseFloat(document.getElementById("cust-O").value),
    C: parseFloat(document.getElementById("cust-C").value),
    E: parseFloat(document.getElementById("cust-E").value),
    A: parseFloat(document.getElementById("cust-A").value),
    N: parseFloat(document.getElementById("cust-N").value),
  };
  const apiKey = document.getElementById("api-key-input").value.trim();

  try {
    const r = await fetch("/api/custom", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({name, desc, ocean, api_key: apiKey || undefined})
    });
    const data = await r.json();
    chart.data.labels = [];
    chart.data.datasets.forEach(ds => ds.data = []);
    chart.update();
    if (data.state) updateUI(data.state);
    document.getElementById("char-name").textContent = name;
    showToast("角色已创建: " + name);
  } catch(e) {
    showToast("创建失败: " + e.message);
  }
}

async function saveCustomChar() {
  const name = document.getElementById("cust-name").value.trim();
  if (!name) { showToast("请先填角色名"); return; }
  const id = "custom_"+name.replace(/[^a-zA-Z0-9一-鿿]/g,"_").toLowerCase();
  const body = {
    id, name,
    desc: document.getElementById("cust-desc").value.trim(),
    api_key: document.getElementById("api-key-input").value.trim(),
    O: parseFloat(document.getElementById("cust-O").value),
    C: parseFloat(document.getElementById("cust-C").value),
    E: parseFloat(document.getElementById("cust-E").value),
    A: parseFloat(document.getElementById("cust-A").value),
    N: parseFloat(document.getElementById("cust-N").value),
  };
  try {
    const r = await fetch("/api/save-character", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    const data = await r.json();
    await refreshCharList(id);
    showToast("💾 已保存: " + name);
  } catch(e) {
    showToast("保存失败: " + e.message);
  }
}

async function refreshCharList(selectId) {
  try {
    // 先触发服务端重扫描
    await fetch("/api/reload");
    const r = await fetch("/api/characters");
    const data = await r.json();
    const sel = document.getElementById("char-switcher");
    sel.innerHTML = data.characters.map(c =>
      `<option value="${c.id}">${c.name}${c.builtin?"":" ✏️"}</option>`
    ).join("");
    if (selectId) sel.value = selectId;
    showToast("已刷新: "+data.characters.length+"个角色");
  } catch(e) {}
}

let debugMode = false;
function toggleDebug() {
  debugMode = !debugMode;
  const btn = document.getElementById("debug-btn");
  btn.style.color = debugMode ? "#f5a623" : "#888";
  btn.style.borderColor = debugMode ? "#f5a623" : "#444";
}

function onLLMToggle() {
  const on = document.getElementById("llm-toggle").checked;
  const dot = document.getElementById("llm-dot");
  if (dot) { dot.textContent = on ? "⏳" : "○"; dot.style.color = on ? "#f80" : "#444"; }
}

// ═══════════════════════════════════════════════
// 重置
// ═══════════════════════════════════════════════
async function resetEngine() {
  // 现在改为重新加载当前角色（不是切到 furina）
  if (!confirm("重置当前角色到初始状态？")) return;
  await fetch("/api/reset", {method:"POST"});
  chart.data.labels = [];
  chart.data.datasets.forEach(ds => ds.data = []);
  chart.update();
  showToast("已重置");
}

async function switchCharacter() {
  const char = document.getElementById("char-switcher").value;
  const r = await fetch("/api/switch", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({character: char})
  });
  const data = await r.json();
  chart.data.labels = [];
  chart.data.datasets.forEach(ds => ds.data = []);
  chart.update();
  if (data.state) updateUI(data.state);
  showToast("已切换: " + data.character);
}

// ═══════════════════════════════════════════════
// Toast
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(text) {
  // 气泡
  const t = document.getElementById("response-toast");
  t.innerHTML = `<div class="utter">${text}</div>`;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 4000);
  // 行内回应
  const disp = document.getElementById("response-display");
  if (disp&&text) disp.textContent = "💬 "+text;
}

// ═══════════════════════════════════════════════
// 键盘
// ═══════════════════════════════════════════════
document.getElementById("event-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendEvent();
});

async function loadChatHistory() {
  try {
    const r = await fetch("/api/chat-log?n=200");
    const data = await r.json();
    chatHistory = (data.messages||[]).map(m => ({
      user: m.user, char: m.reply, time: new Date(m.t*1000).toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit"})
    }));
    renderMessages();
  } catch(e) {}
}
